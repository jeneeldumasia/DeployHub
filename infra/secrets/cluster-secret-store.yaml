apiVersion: v1
kind: ServiceAccount
metadata:
  name: external-secrets-sa
  namespace: external-secrets
  annotations:
    # IRSA: Bound to IAM role allowing exactly "secretsmanager:GetSecretValue"
    # restricted by condition to specific prefix or tags if necessary.
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/DeployHubESO
---
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: aws-secrets-manager
spec:
  provider:
    aws:
      service: SecretsManager
      region: us-east-1
      auth:
        jwt:
          serviceAccountRef:
            name: external-secrets-sa
            namespace: external-secrets
