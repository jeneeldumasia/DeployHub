apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: deployhub-controller-pdb
  namespace: deployhub-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: deployhub-controller
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: deployhub-worker-pdb
  namespace: deployhub-system
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: deployhub-worker
