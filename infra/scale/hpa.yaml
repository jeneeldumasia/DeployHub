apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shipzen-controller-hpa
  namespace: shipzen-system
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shipzen-controller
  minReplicas: 2
  maxReplicas: 5
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
