apiVersion: v1
kind: ServiceAccount
metadata:
  name: deployhub-builder-sa
  namespace: deployhub-build
  annotations:
    # IRSA: IAM Roles for Service Accounts
    # This role has policies attached for ECR read/write (Registry Credential Security)
    eks.amazonaws.com/role-arn: arn:aws:iam::123456789012:role/DeployHubBuilderRole
automountServiceAccountToken: false # Block Kubernetes API access by default
