apiVersion: apps/v1
kind: Deployment
metadata:
  name: shipzen-api
  namespace: shipzen-system
  labels:
    app: shipzen-api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: shipzen-api
  template:
    metadata:
      labels:
        app: shipzen-api
    spec:
      serviceAccountName: shipzen-api-sa
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: api
          image: shipzen-api:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: shipzen-db-credentials
                  key: url
            - name: REDIS_HOST
              value: "redis-master.shipzen-system.svc.cluster.local"
            - name: STREAM_NAME
              value: "builder_queue"
            - name: UI_ORIGIN
              value: "https://shipzen.jeneeldumasia.codes"
            - name: ECR_REPOSITORY_URL
              valueFrom:
                secretKeyRef:
                  name: shipzen-ecr-config
                  key: repository_url
            - name: AUTH0_DOMAIN
              valueFrom:
                secretKeyRef:
                  name: shipzen-auth0
                  key: domain
                  optional: true
            - name: AUTH0_AUDIENCE
              valueFrom:
                secretKeyRef:
                  name: shipzen-auth0
                  key: audience
                  optional: true
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
