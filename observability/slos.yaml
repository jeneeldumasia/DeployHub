apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: shipzen-slos
  namespace: observability
spec:
  groups:
    - name: shipzen-slos
      rules:
        # SLO: Platform Availability > 99.9%
        # Based on Envoy Gateway HTTP success rate
        - record: job:platform_availability:1h
          expr: |
            sum(rate(envoy_http_requests_total{response_code_class="2xx"}[1h]))
            /
            sum(rate(envoy_http_requests_total[1h]))

        # SLO: Queue Latency < 10 seconds (95th percentile)
        # Uses shipzen_queue_latency_seconds which IS instrumented in worker/metrics.py
        - record: job:queue_latency_seconds:p95:5m
          expr: histogram_quantile(0.95, sum by(le) (rate(shipzen_queue_latency_seconds_bucket[5m])))

        # SLO: Deployment retry rate < 5%
        # Uses shipzen_retry_total (Counter) and shipzen_queue_depth (Gauge)
        # Both ARE instrumented in worker/metrics.py
        - record: job:deployment_retry_rate:5m
          expr: rate(shipzen_retry_total_total[5m])

        # SLO: DLQ depth = 0 (no deployments should permanently fail)
        # Uses shipzen_dlq_depth which IS instrumented in worker/metrics.py
        - record: job:dlq_depth:current
          expr: shipzen_dlq_depth

        # SLO: Deployment Success (derived metric)
        - record: job:deployment_success_total
          expr: shipzen_deployment_success_total

        # SLO: Deployment Failure (derived metric)
        - record: job:deployment_failure_total
          expr: shipzen_deployment_failure_total

        # SLO: Build Duration (95th percentile)
        - record: job:build_duration_seconds:p95:1h
          expr: histogram_quantile(0.95, sum by(le) (rate(shipzen_build_duration_seconds_bucket[1h])))
