apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: deployhub-slos
  namespace: observability
spec:
  groups:
    - name: deployhub-slos
      rules:
        # SLO: Deployment Success Rate > 99%
        # Recording rule aggregated by deployment_id
        - record: job:deployment_success_rate:1h
          expr: |
            sum(rate(deployhub_deployment_success_total[1h])) 
            / 
            (sum(rate(deployhub_deployment_success_total[1h])) + sum(rate(deployhub_deployment_failure_total[1h])))
            
        # SLO: Platform Availability > 99.9%
        # Aggregated Gateway success vs 5xx errors
        - record: job:platform_availability:1h
          expr: |
            sum(rate(envoy_http_requests_total{response_code_class="2xx"}[1h])) 
            / 
            sum(rate(envoy_http_requests_total[1h]))

        # SLO: Build Duration < 5 minutes (95th percentile)
        - record: job:build_duration_seconds:p95:1h
          expr: histogram_quantile(0.95, sum by(le) (rate(deployhub_build_duration_seconds_bucket[1h])))

        # SLO: Queue Latency < 10 seconds (95th percentile)
        - record: job:queue_latency_seconds:p95:5m
          expr: histogram_quantile(0.95, sum by(le) (rate(deployhub_queue_latency_seconds_bucket[5m])))
