apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: external-secrets-alerts
  namespace: observability
spec:
  groups:
    - name: external-secrets
      rules:
        # Alert when a secret fails to sync
        - alert: ExternalSecretSyncFailed
          expr: externalsecret_sync_status{status="ConditionFalse"} > 0
          for: 5m
          labels:
            severity: high
          annotations:
            summary: "ExternalSecret sync failed"
            description: "ExternalSecret {{ $labels.name }} in namespace {{ $labels.namespace }} has failed to sync for more than 5 minutes."

        # Alert when AWS Secrets Manager returns throttling/errors
        - alert: AWSSecretsManagerAPIErrorRateHigh
          expr: rate(externalsecret_provider_api_requests_total{status_code=~"5..|429"}[5m]) > 0.1
          for: 5m
          labels:
            severity: critical
          annotations:
            summary: "High API error rate to AWS Secrets Manager"
            description: "External Secrets Operator is experiencing high error rates or throttling when contacting AWS Secrets Manager."
            
        # Secret Expiry (If annotated/tracked via a custom exporter or ESO condition)
        # Assuming a custom metric `secret_expiry_days_remaining` exists from our security scanner
        - alert: SecretExpiringSoon
          expr: secret_expiry_days_remaining < 7
          for: 1h
          labels:
            severity: warning
          annotations:
            summary: "Secret is expiring within 7 days"
            description: "Secret {{ $labels.secret_name }} in namespace {{ $labels.namespace }} is expiring soon. Rotation is required."
