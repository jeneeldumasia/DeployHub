apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: deployhub-gateway
  namespace: deployhub-system
  annotations:
    # AWS ALB will target this Gateway service
    # Do NOT use NodePort; use LoadBalancer or ClusterIP (if ALB Ingress Controller supports it)
    service.beta.kubernetes.io/aws-load-balancer-type: "external"
    service.beta.kubernetes.io/aws-load-balancer-nlb-target-type: "ip"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  gatewayClassName: envoy-gateway
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https
      protocol: HTTPS
      port: 443
      hostname: "*.deployhub.io" # Wildcard Domains requirement
      tls:
        mode: Terminate
        certificateRefs:
          - name: deployhub-tls-cert
      allowedRoutes:
        namespaces:
          from: All
