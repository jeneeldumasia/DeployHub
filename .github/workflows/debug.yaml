name: Debug Cluster
on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ vars.AWS_ACCOUNT_ID }}:role/DeployHub-AA-SuperRole
          aws-region: ${{ vars.AWS_REGION || 'us-east-1' }}

      - name: Debug Cluster
        run: |
          aws eks update-kubeconfig --region ${{ vars.AWS_REGION || 'us-east-1' }} --name deployhub-cluster
          echo "=== NODES ==="
          kubectl get nodes -o wide || true
          echo "=== PODS ==="
          kubectl get pods -A -o wide || true
          echo "=== EVENTS ==="
          kubectl get events -A --sort-by='.lastTimestamp' | tail -n 50 || true
          echo "=== WEBHOOKS ==="
          kubectl get validatingwebhookconfigurations || true
          kubectl get mutatingwebhookconfigurations || true
